name: CI/CD Recetas App

# Se ejecuta automáticamente con cada push o pull request a main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Tests del backend (Node.js + Jest)
  # ─────────────────────────────────────────
  test-backend:
    name: "Backend — Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        working-directory: backend
        run: npm ci

      - name: Ejecutar tests
        working-directory: backend
        run: npm test

  # ────────────────────────────────────────────
  # JOB 2: Build del frontend (React + Vite)
  # ────────────────────────────────────────────
  build-frontend:
    name: "Frontend — Build"
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Build de producción
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Guardar build como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  # ────────────────────────────────────────────────────────
  # JOB 3: Deploy a Render (solo si tests y build pasaron)
  # ────────────────────────────────────────────────────────
  deploy:
    name: "Deploy a Render"
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]  # depende de ambos jobs anteriores
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger deploy backend en Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✅ Deploy del backend disparado en Render"

      - name: Notificar resultado
        run: |
          echo "🚀 Pipeline completado:"
          echo "   ✅ Tests pasaron"
          echo "   ✅ Build exitoso"
          echo "   ✅ Deploy disparado"
